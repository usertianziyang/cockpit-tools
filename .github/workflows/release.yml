name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "macos-aarch64"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            release_dir: "target/aarch64-apple-darwin/release"
          - label: "macos-x86_64"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            release_dir: "target/x86_64-apple-darwin/release"
          - label: "macos-universal"
            platform: "macos-latest"
            args: "--target universal-apple-darwin"
            release_dir: "target/universal-apple-darwin/release"
          - label: "linux-x86_64"
            platform: "ubuntu-22.04"
            args: ""
            release_dir: "target/release"
          - label: "linux-aarch64"
            platform: "ubuntu-24.04-arm"
            args: ""
            release_dir: "target/release"
          - label: "windows-x86_64"
            platform: "windows-latest"
            args: ""
            release_dir: "target/release"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libnm-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/cockpit-cliproxy/go.mod
          cache-dependency-path: sidecars/cockpit-cliproxy/go.sum

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install

      - name: Sync versions
        run: npm run sync-version

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          VERSION="$(node -e "console.log(require(require('path').join(process.env.GITHUB_WORKSPACE, 'package.json')).version)")"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          EXPECTED_TAG="v${{ steps.app_version.outputs.VERSION }}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "Tag (${GITHUB_REF_NAME}) does not match package.json version (${EXPECTED_TAG})."
            exit 1
          fi

      - name: Build the app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          npx tauri build --ci ${{ matrix.args }} 2>&1 | tee "build-${{ matrix.label }}.log"

      - name: Print build logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== BUILD LOG ==="
          if [ -f "build-${{ matrix.label }}.log" ]; then
            tail -n 200 "build-${{ matrix.label }}.log"
          else
            echo "Log file not found"
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: error
          path: build-${{ matrix.label }}.log

      - name: Upload release assets
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.label }}
          retention-days: 7
          if-no-files-found: error
          path: |
            ${{ matrix.release_dir }}/bundle/**/*.AppImage
            ${{ matrix.release_dir }}/bundle/**/*.deb
            ${{ matrix.release_dir }}/bundle/**/*.dmg
            ${{ matrix.release_dir }}/bundle/**/*.exe
            ${{ matrix.release_dir }}/bundle/**/*.msi
            ${{ matrix.release_dir }}/bundle/**/*.rpm
            ${{ matrix.release_dir }}/bundle/**/*.sig
            ${{ matrix.release_dir }}/bundle/**/*.tar.gz

  publish-release:
    name: Publish release as latest
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -e "console.log(require('./package.json').version)")"
          if [ "${VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "Tag (${GITHUB_REF_NAME}) does not match package.json version (v${PACKAGE_VERSION})."
            exit 1
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"

      - name: Build bilingual release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          extract_section() {
            local file="$1"
            local version="$2"

            awk -v version="$version" '
              BEGIN {
                capture = 0
                found = 0
              }

              /^## / {
                if (capture) {
                  exit
                }
                if ($0 ~ ("^## \\[" version "\\][[:space:]]*-.*$") || $0 ~ ("^## \\[v" version "\\][[:space:]]*-.*$")) {
                  capture = 1
                  found = 1
                }
              }

              capture {
                if ($0 ~ /^---[[:space:]]*$/) {
                  exit
                }
                print
              }

              END {
                if (!found) {
                  exit 2
                }
              }
            ' "$file"
          }

          if ! zh_section="$(extract_section CHANGELOG.zh-CN.md "${VERSION}")"; then
            echo "Missing changelog section for version ${VERSION} in CHANGELOG.zh-CN.md"
            exit 1
          fi

          if ! en_section="$(extract_section CHANGELOG.md "${VERSION}")"; then
            echo "Missing changelog section for version ${VERSION} in CHANGELOG.md"
            exit 1
          fi

          {
            echo "## 更新日志（中文）"
            echo
            printf '%s\n' "$zh_section"
            echo
            echo "## Changelog (English)"
            echo
            printf '%s\n' "$en_section"
          } > release-notes.md

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: downloaded-release-assets

      - name: Flatten and validate assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-release-assets -type f \
            \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" -o -name "*.rpm" -o -name "*.sig" -o -name "*.tar.gz" \) \
            -print0 |
            while IFS= read -r -d '' file; do
              artifact_dir="${file#downloaded-release-assets/}"
              artifact_dir="${artifact_dir%%/*}"
              base="$(basename "$file")"

              case "$base" in
                "Cockpit Tools.app.tar.gz")
                  case "$artifact_dir" in
                    release-assets-macos-aarch64) base="Cockpit.Tools_aarch64.app.tar.gz" ;;
                    release-assets-macos-x86_64) base="Cockpit.Tools_x64.app.tar.gz" ;;
                    release-assets-macos-universal) base="Cockpit.Tools_universal.app.tar.gz" ;;
                    *)
                      echo "Cannot determine macOS app tar architecture from artifact: ${artifact_dir}"
                      exit 1
                      ;;
                  esac
                  ;;
                "Cockpit Tools.app.tar.gz.sig")
                  case "$artifact_dir" in
                    release-assets-macos-aarch64) base="Cockpit.Tools_aarch64.app.tar.gz.sig" ;;
                    release-assets-macos-x86_64) base="Cockpit.Tools_x64.app.tar.gz.sig" ;;
                    release-assets-macos-universal) base="Cockpit.Tools_universal.app.tar.gz.sig" ;;
                    *)
                      echo "Cannot determine macOS app tar signature architecture from artifact: ${artifact_dir}"
                      exit 1
                      ;;
                  esac
                  ;;
                Cockpit\ Tools*)
                  base="Cockpit.Tools${base#Cockpit Tools}"
                  ;;
              esac

              target="release-assets/${base}"
              if [ -e "$target" ]; then
                if cmp -s "$file" "$target"; then
                  continue
                fi
                echo "Duplicate release asset name with different content: ${base}"
                exit 1
              fi
              cp "$file" "$target"
            done

          find release-assets -maxdepth 1 -type f | sort

          required_patterns=(
            'Cockpit.Tools_'"${VERSION}"'_aarch64.dmg'
            'Cockpit.Tools_'"${VERSION}"'_x64.dmg'
            'Cockpit.Tools_'"${VERSION}"'_universal.dmg'
            'Cockpit.Tools_aarch64.app.tar.gz'
            'Cockpit.Tools_aarch64.app.tar.gz.sig'
            'Cockpit.Tools_x64.app.tar.gz'
            'Cockpit.Tools_x64.app.tar.gz.sig'
            'Cockpit.Tools_universal.app.tar.gz'
            'Cockpit.Tools_universal.app.tar.gz.sig'
            'Cockpit.Tools_'"${VERSION}"'_x64_en-US.msi'
            'Cockpit.Tools_'"${VERSION}"'_x64_en-US.msi.sig'
            'Cockpit.Tools_'"${VERSION}"'_x64-setup.exe'
            'Cockpit.Tools_'"${VERSION}"'_x64-setup.exe.sig'
            'Cockpit.Tools_'"${VERSION}"'_amd64.AppImage'
            'Cockpit.Tools_'"${VERSION}"'_amd64.AppImage.sig'
            'Cockpit.Tools_'"${VERSION}"'_aarch64.AppImage'
            'Cockpit.Tools_'"${VERSION}"'_aarch64.AppImage.sig'
            'Cockpit.Tools_'"${VERSION}"'_amd64.deb'
            'Cockpit.Tools_'"${VERSION}"'_amd64.deb.sig'
            'Cockpit.Tools_'"${VERSION}"'_arm64.deb'
            'Cockpit.Tools_'"${VERSION}"'_arm64.deb.sig'
            'Cockpit.Tools-'"${VERSION}"'-1.x86_64.rpm'
            'Cockpit.Tools-'"${VERSION}"'-1.x86_64.rpm.sig'
            'Cockpit.Tools-'"${VERSION}"'-1.aarch64.rpm'
            'Cockpit.Tools-'"${VERSION}"'-1.aarch64.rpm.sig'
          )

          for name in "${required_patterns[@]}"; do
            if [ ! -f "release-assets/${name}" ]; then
              echo "Missing required release asset: ${name}"
              exit 1
            fi
          done

      - name: Build merged latest.json
        shell: bash
        run: |
          set -euo pipefail
          PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          node scripts/release/build_merged_latest_json.cjs \
            --version "${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --assets-dir "release-assets" \
            --notes-file "release-notes.md" \
            --published-at "${PUBLISHED_AT}" \
            --output "release-assets/latest.json"

      - name: Validate merged latest.json
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .platforms["darwin-aarch64"] and
            .platforms["darwin-x86_64"] and
            .platforms["windows-x86_64"] and
            .platforms["windows-x86_64-nsis"] and
            .platforms["linux-x86_64-appimage"] and
            .platforms["linux-x86_64-deb"] and
            .platforms["linux-x86_64-rpm"] and
            .platforms["linux-aarch64-appimage"] and
            .platforms["linux-aarch64-deb"] and
            .platforms["linux-aarch64-rpm"]
          ' release-assets/latest.json > /dev/null
          jq -r '.platforms | keys[]' release-assets/latest.json

      - name: Generate SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          find . -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                shasum -a 256 "$file"
              done \
            | sed 's#  \./#  #' \
            > SHA256SUMS.txt
          test -s SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create and publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" \
            --jq '.[] | select(.tag_name == "'"${TAG}"'" and .draft == true) | .id' |
            while IFS= read -r release_id; do
              if [ -n "$release_id" ]; then
                echo "Deleting stale draft release ${release_id} for ${TAG}"
                gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
              fi
            done

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq '.isDraft' >/tmp/release-draft-state 2>/dev/null; then
            draft_state="$(cat /tmp/release-draft-state)"
            if [ "$draft_state" != "true" ]; then
              echo "Release ${TAG} already exists and is not a draft."
              exit 1
            fi
          fi

          gh release create "${TAG}" release-assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --draft \
            --prerelease=false \
            --title "Cockpit Tools v${VERSION}" \
            --notes-file release-notes.md \
            --target "${GITHUB_SHA}"

          gh release edit "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --draft=false \
            --prerelease=false \
            --latest

  update-homebrew-cask:
    name: Update Homebrew Cask
    needs: publish-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Determine version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Download universal DMG from GitHub Releases (retry)
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Cockpit.Tools_${VERSION}_universal.dmg"
          echo "Downloading: $URL"
          for i in $(seq 1 30); do
            if curl -fL --retry 3 --retry-delay 1 -o cockpit-tools.dmg "$URL"; then
              exit 0
            fi
            echo "Asset not ready yet (attempt $i/30). Sleeping 10s..."
            sleep 10
          done
          echo "Failed to download release asset after retries."
          exit 1

      - name: Compute sha256
        shell: bash
        run: |
          set -euo pipefail
          SHA256="$(sha256sum cockpit-tools.dmg | awk '{print $1}')"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Update Cask file
        shell: bash
        run: |
          set -euo pipefail
          FILE="Casks/cockpit-tools.rb"
          if [ ! -f "$FILE" ]; then
            echo "Missing $FILE. Create it first."
            exit 1
          fi

          perl -0777 -i -pe \
            's/version \"[^\"]+\"/version \"'"$VERSION"'\"/; s/sha256 \"[0-9a-f]{64}\"/sha256 \"'"$SHA256"'\"/' \
            "$FILE"

          git diff -- "$FILE"

      - name: Create pull request
        id: create_cask_pr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(homebrew): update cask for v${{ env.VERSION }}"
          title: "chore(homebrew): update cask for v${{ env.VERSION }}"
          body: |
            Auto-generated by the release workflow.

            - version: ${{ env.VERSION }}
            - sha256 (universal.dmg): ${{ env.SHA256 }}
          branch: "automation/update-cask-v${{ env.VERSION }}"
          base: main
          delete-branch: true

      - name: Enable auto-merge for cask PR
        if: ${{ steps.create_cask_pr.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER="${{ steps.create_cask_pr.outputs.pull-request-number }}"
          PR_BRANCH="$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)"
          if [[ "$PR_BRANCH" != automation/update-cask-v* ]]; then
            echo "Unexpected PR branch: $PR_BRANCH"
            exit 1
          fi
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
